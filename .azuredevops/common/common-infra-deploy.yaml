parameters:
  - name: projectName
    displayName: Project name
    type: string
  - name: deployFromFeature
    displayName: Deploy to Development Environment from feature branch
    type: boolean
    default: false
  - name: privateAgentName
    displayName: Private agent pool name. It is used to set a self-hosted private agent pool, while `agentImage` is used to run the pipeline on Microsoft-hosted agents
    type: string
    default: ''
  - name: agentImage
    displayName: Microsoft-hosted agent pool name. if both `agentImage` and `privateAgentName` is not supplied then it uses 'windows-latest' pool
    type: string
    default: ''
  - name: keyVaultName
    displayName: Name of the Azure Key Vault to load the secrets from
    type: string
    default: ''
  - name: keyVaultSecretsFilter
    displayName: A comma-separated list of secret names to be downloaded or * to download all secrets from the selected key vault
    type: string
    default: ''
  - name: groupedDeployments
    displayName: List of GroupedDeployments(ARM/Bicep deployments)
    type: object
  - name: environments
    displayName: List of environments
    type: object
    default: []
  - name: applicationID
    displayName: Application ID
    type: string
    default: 'aie'
  - name: instance
    displayName: Instance
    type: string
    default: '01'
  - name: filePathsForTransform
    displayName: Additional files location to replace tokens
    type: string
    default: ''
  - name: variableFiles
    displayName: List of variable files
    type: object
    default: 
      - /config/common.yaml@PltConfig
      - /config/{applicationID}/{instance}/core.yaml@PltConfig
  - name: regionalVariableFiles
    displayName: List of regional variable files
    type: object
    default: 
      - /config/regional/{environment}-{region}.yaml@PltConfig
  - name: additionalRepositories
    displayName: Additional repositories that needs reference in the process
    type: object
    default: []
  - name: includePlatformEnvs
    displayName: Include Platform Environments (SND1 and SND2)
    type: boolean
    default: true
  # Location for the regional config file path: config/regional/{environment}-{region}.yaml (e.g. uksouth, ukwest). Must be passed by caller; no default.
  - name: location
    displayName: Location (e.g. uksouth, ukwest) for loading config/regional/{env}-{region}.yaml
    type: string

resources:
  repositories:
    - repository: PipelineCommon
      name: DEFRA/ado-pipeline-common
      endpoint: DEFRA
      type: github
      ref: refs/heads/ml/add-applicationID-support      
    - repository: PltConfig
      name: DEFRA/plt-config
      endpoint: DEFRA
      type: github
      ref: refs/heads/ml/initial-structure

extends:
  template: /templates/pipelines/common-infrastructure-deploy.yaml@PipelineCommon
  parameters:
    deployFromFeature: ${{ parameters.deployFromFeature }}
    privateAgentName: ${{ parameters.privateAgentName }}
    agentImage: ${{ parameters.agentImage }}
    repositoryRoot: $(Pipeline.Workspace)/s/self
    filePathsForTransform: ${{ parameters.filePathsForTransform }}
    additionalRepositories: 
      - ${{ each repo in parameters.additionalRepositories }}:
        - ${{ repo }}
    variableFiles: ${{ parameters.variableFiles }}
    regionalVariableFiles: ${{ parameters.regionalVariableFiles }}
    applicationID: ${{ parameters.applicationID }}
    instance: ${{ parameters.instance }}
    groupedDeployments:
      - ${{ each groupTemplate in parameters.groupedDeployments }}:
        - name: ${{ groupTemplate.name }}
          dependsOnGroupedDeployments: ${{ groupTemplate.dependsOnGroupedDeployments }}
          deployments:
            - ${{ each deployment in groupTemplate.deployments }}:
              - name: ${{ deployment.name }}
                path: ${{ deployment.path }}
                scope: ${{ coalesce(deployment.scope,'Resource Group')}}
                type: ${{ coalesce(deployment.type,'bicep')}}
                templateName: ${{ deployment.templateName }}
                deploy: ${{ deployment.deploy }}
                scriptType: ${{ deployment.scriptType }}       
                azurePowershellUseCore: ${{ deployment.azurePowershellUseCore }}                  
                azureCLIScriptType: ${{ deployment.azureCLIScriptType }}   
                useSystemAccessTokeninScript: ${{ coalesce(deployment.useSystemAccessTokeninScript, False)}}           
                scriptArguments: ${{ deployment.scriptArguments }}
                parameterFilePath: ${{ deployment.parameterFilePath }} 
                scriptRepo: ${{ deployment.scriptRepo }}
                inlineScript: ${{ deployment.inlineScript }}
                resourceName: ${{ deployment.resourceName }}
                resourceGroupName: ${{ deployment.resourceGroupName }}
                preDeployScriptsList: ${{ deployment.preDeployScriptsList }}
                serviceConnectionVariableName: ${{ deployment.serviceConnectionVariableName }}
                postDeployServiceConnectionVariableName: ${{ deployment.postDeployServiceConnectionVariableName }}
                replaceTokenPaths: ${{ deployment.replaceTokenPaths }}
                replaceTokenPathsString: ${{ deployment.replaceTokenPathsString }}
                replaceTokenTargetFiles: ${{ deployment.replaceTokenTargetFiles }}
                postDeployScriptsList:
                  - ? ${{ each resource in deployment.privateEndpointDnsRecordsForResources }}
                    : - displayName: Resolve Private Endpoint IP for '${{ resource.resourceName }}'
                        scriptPath: "PowerShellLibrary/Get-ResourcePrivateEndPointsDnsRecordsAsJson.ps1"
                        scriptRepo: PipelineCommonScripts
                        ScriptArguments: >
                          -ResourceGroupName '${{ resource.resourceGroupName }}'
                          -ResourceName '${{ resource.resourceName }}'

                      - displayName: Set DNS record for '${{ resource.resourceName }}'
                        scriptPath: "PowerShellLibrary/Set-PrivateDnsRecordSet.ps1"
                        scriptRepo: PipelineCommonScripts
                        serviceConnectionVariableName: "mstAzureResourceManagerConnection"
                        ScriptArguments: >
                          -Ttl 120
                  - ${{ each script in deployment.postDeployScriptsList }}:
                      - ${{ script }}
    ${{ if gt(length(parameters.environments), 0) }}:
      environments:
        - ${{ parameters.environments }}
    ${{ else }}:
      environments:
        # deploy to all environments except snd1 & snd2 for service pipelines
        - ${{ if eq(parameters.includePlatformEnvs, True) }}:
          - name: snd1
            serviceConnection: $(subscriptionName)
            deploymentBranches:
              - 'refs/heads/main'
            developmentEnvironment: true
            privateAgentName: 'DEFRA-COMMON-UBUNTU-SSV3'
            ${{ if ne( coalesce(parameters.keyVaultName,''), '') }}:
              keyVaultList:
                - Name: ${{ parameters.keyVaultName }}
                  SecretsFilter: ${{ parameters.keyVaultSecretsFilter }}
                  runAsPreJob: true
            # location → azureRegions.primary: PipelineCommon uses it to build the regional file path (config/regional/{env}-{region}.yaml). Runtime location comes from the loaded regional file.
            azureRegions:
              primary: ${{ parameters.location }}
   