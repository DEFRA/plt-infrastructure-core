name: 1.0.$(BuildID)-${{ parameters.deployResources }}

parameters:
  - name: deployFromFeature
    displayName: "Deploy from Feature Branch"
    type: boolean
    default: false
  - name: deployResources
    displayName: "Resources to Deploy"
    type: string
    default: "All"
    values:
      - All
      - Network - All
      - Network - VNET
      - Network - NSGs
      - Network - Route Tables
      - Network - Public DNS Zone
      - Network - Flow Logs
      - Monitoring - All
      - Monitoring - Insights
      - Monitoring - Azure Monitor Workspace
      - Application - All
      - Application - AI Document Intelligence - Deployment 1
      - Application - Storage Account
      - Application - Key Vault
      - Platform - Key Vault
      - OpenAI - All
      - OpenAI - Infra  
      - OpenAI - Search Service
      - Rbac - Global Team Permissions
  - name: applicationID
    displayName: "Application ID (config folder name, e.g. aie)"
    type: string
    default: 'aie'
  - name: instance
    displayName: "Instance (config folder name, e.g. 01)"
    type: string
    default: '01'
  - name: location
    displayName: "Location for config (e.g. uksouth, ukwest). Must match config/regional/{environment}-{region}.yaml filename."
    type: string

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/core/env/*
      - infra/common/*
  drafts: false
        
trigger:
  batch: true
  branches:
    include:
      - '*'
  paths:
    include:
      - infra/core/env/*
      - infra/common/*
     
variables:
  - name: IsAll
    value: ${{ eq(parameters.deployResources,'All') }}
  - name: IsNetwork
    value: ${{ or(eq(variables.IsAll,true), startsWith(parameters.deployResources,'Network')) }}
  - name: IsNetworkAll
    value: ${{ or(eq(variables.IsAll,true), eq(parameters.deployResources,'Network - All')) }}
  - name: IsNetworkVnet
    value: ${{ or(eq(variables.IsNetworkAll,true), eq(parameters.deployResources,'Network - VNET')) }}
  - name: IsNetworkNsg
    value: ${{ or(eq(variables.IsNetworkAll,true), eq(parameters.deployResources,'Network - NSGs')) }}
  - name: IsNetworkRouteTable
    value: ${{ or(eq(variables.IsNetworkAll,true), eq(parameters.deployResources,'Network - Route Tables')) }}
  - name: IsNetworkFlowLogs
    value: ${{ or(eq(variables.IsNetworkAll,true), eq(parameters.deployResources,'Network - Flow Logs')) }}
  - name: IsNetworkPublicDNSZone
    value: ${{ or(eq(variables.IsNetworkAll,true), eq(parameters.deployResources,'Network - Public DNS Zone')) }}
  - name: IsMonitoring
    value: ${{ or(eq(variables.IsAll,true), startsWith(parameters.deployResources, 'Monitoring')) }}
  - name: IsMonitoringAll
    value: ${{ or(eq(variables.IsAll,true), eq(parameters.deployResources,'Monitoring - All')) }}
  - name: IsMonitoringInsights
    value: ${{ or(eq(variables.IsMonitoringAll,true), eq(parameters.deployResources,'Monitoring - Insights')) }}
  - name: IsMonitoringAzureMonitorWorkspace
    value: ${{ or(eq(variables.IsMonitoringAll,true), eq(parameters.deployResources,'Monitoring - Azure Monitor Workspace')) }}
  - name: IsPlatformKeyVault
    value: ${{ or(eq(variables.IsAll,true), eq(parameters.deployResources, 'Platform - Key Vault')) }}
  - name: IsApplication
    value: ${{ or(eq(variables.IsAll,true), startsWith(parameters.deployResources, 'Application')) }}
  - name: IsApplicationAll
    value: ${{ or(eq(variables.IsAll,true), eq(parameters.deployResources, 'Application - All')) }}
  - name: IsApplicationAiDocumentIntelligence1
    value: ${{ or(eq(variables.IsApplicationAll,true), eq(parameters.deployResources, 'Application - AI Document Intelligence - Deployment 1')) }}
  - name: IsApplicationStorageAccount
    value: ${{ or(eq(variables.IsApplicationAll,true), eq(parameters.deployResources, 'Application - Storage Account')) }}
  - name: IsApplicationKeyVault
    value: ${{ or(eq(variables.IsApplicationAll,true), eq(parameters.deployResources, 'Application - Key Vault')) }}
  - name: IsOpenAi
    value: ${{ or(eq(variables.IsAll,true), startsWith(parameters.deployResources, 'OpenAI -')) }}
  - name: IsOpenAiAll
    value: ${{ or(eq(variables.IsAll,true), eq(parameters.deployResources, 'OpenAI - All')) }}
  - name: IsOpenAiInfra
    value: ${{ or(eq(variables.IsOpenAiAll,true), eq(parameters.deployResources, 'OpenAI - Infra')) }}
  - name: IsOpenAiSearchService
    value: ${{ or(eq(variables.IsOpenAiAll,true), eq(parameters.deployResources, 'OpenAI - Search Service')) }}
  - name: IsGlobalTeamPermissions
    value: ${{ or(eq(variables.IsAll,true), eq(parameters.deployResources, 'Rbac - Global Team Permissions')) }}
  - name: globalReadGroupObjectId
    value: 'dummyValueToPreventWarningInAzureDevOps'
  - name: applicationID
    value: ${{ parameters.applicationID }}
  # virtualNetworkResourceGroup will be set by the create-virtual-network-resource-group script deployment
  # For validation, use a placeholder value (will be overridden by script with actual resource group name)
  - name: virtualNetworkResourceGroup
    value: 'ValidationPlaceholderRG'
  # virtualNetworkName will be set by the create-virtual-network-resource-group script deployment
  # For token replacement, use a placeholder value (will be overridden by script with actual virtual network name)
  - name: virtualNetworkName
    value: 'ValidationPlaceholderVNet'
  - name: routeTableName
    value: ''
  # Firewall virtual appliance IP for route table next hop (set in variable group or config; required when deploying route tables that use VirtualAppliance)
  - name: firewallVirtualApplianceIp
    value: ''
  # addressPrefixes, dnsServers, environment, resourceLockEnabled, location, subType, deploymentEnvInstance, regionCode, instanceNumber come from config (variable files)
  # subnets: from layout in filePathsForTransform (framework token replacement); preDeploy reads transformed layout and sets this
  - name: subnets
    value: '[]'
  - name: networkJoinGroupObjectId
    value: ''
  # Platform resource group roles to create (in addition to INF). INF is always created first. Comma-separated, e.g. EXP,APP. Set in config (variable files).
  - name: platformResourceGroups
    value: ''

extends:
  template: /.azuredevops/common/common-infra-deploy.yaml
  parameters:
    projectName: $(projectName)
    deployFromFeature: ${{ parameters.deployFromFeature }}
    applicationID: ${{ parameters.applicationID }}
    instance: ${{ parameters.instance }}
    location: ${{ parameters.location }}
    filePathsForTransform: |
      **/core/env/app-configuration/config-data/config-data.json
      **/infra/core/env/insights/aad-groups/monitoringpublishergroup.json    
      **/infra/core/env/open-ai/aad-groups/openaiaccessgroup.json
      **/infra/core/env/search-service/aad-groups/searchserviceaccessgroup.json
    groupedDeployments:
        - name: setup
          deployments:
              - name: variable-setup
                type: 'script'
                scriptType: AzureCLI
                azureCLIScriptType: bash
                inlineScript: |
                  appId="$(applicationID)"
                  applicationIDUpper=$(echo "$appId" | tr '[:lower:]' '[:upper:]')
                  applicationIDLower=$(echo "$appId" | tr '[:upper:]' '[:lower:]')
                  echo "##vso[task.setvariable variable=applicationID]$applicationIDUpper"
                  echo "##vso[task.setvariable variable=applicationIDLower]$applicationIDLower"
                  echo "Normalized applicationID to $applicationIDUpper, applicationIDLower to $applicationIDLower"
        - ${{ if eq(variables.IsNetwork, true) }}:
          - name: network
            dependsOnGroupedDeployments:
              - setup
            deployments:
              - ${{ if or(eq(variables.IsNetworkVnet, true), eq(variables.IsNetworkRouteTable, true), eq(variables.IsNetworkNsg, true)) }}:
                - name: create-platform-resource-groups
                  type: 'script'
                  scriptType: AzureCLI
                  serviceConnectionVariableName: 'mstAzureResourceManagerConnection'
                  azureCLIScriptType: pscore
                  inlineScript: |
                    $ErrorActionPreference = 'Stop'
                    $root = "$(Pipeline.Workspace)/s/self"
                    $subType = $env:subType ?? $env:SUBTYPE
                    $svc = ($env:serviceCode ?? $env:SERVICECODE ?? ($env:applicationID ?? $env:APPLICATIONID).ToString().ToUpperInvariant())
                    $deploymentEnvInstance = $env:deploymentEnvInstance ?? $env:DEPLOYMENTENVINSTANCE
                    $regionCode = $env:regionCode ?? $env:REGIONCODE
                    $instanceNumber = $env:instanceNumber ?? $env:INSTANCENUMBER
                    $location = $env:location ?? $env:LOCATION
                    $adGroupObjectId = $env:adGroupObjectId ?? $env:ADGROUPOBJECTID
                    if (-not $subType -or -not $svc -or -not $deploymentEnvInstance -or -not $regionCode -or -not $instanceNumber -or -not $location -or -not $adGroupObjectId) {
                      throw 'Required config (variable file) values missing: subType, serviceCode (or applicationID), deploymentEnvInstance, regionCode, instanceNumber, location, adGroupObjectId. Set these in plt-config (e.g. config/aie/01/core.yaml and config/regional/snd1-uksouth.yaml).'
                    }
                    $namingFile = Join-Path $root "resources/naming-convention/get-names.bicep"
                    if (-not (Test-Path $namingFile)) { $namingFile = Join-Path $root "self/resources/naming-convention/get-names.bicep" }
                    $bicepFile = Join-Path $root "resources/resource-group/resource-group-with-rbac.bicep"
                    if (-not (Test-Path $bicepFile)) { $bicepFile = Join-Path $root "self/resources/resource-group/resource-group-with-rbac.bicep" }
                    $roles = @('INF') + (("$(platformResourceGroups)" -split ',').Trim() | Where-Object { $_ })
                    foreach ($Role in $roles) {
                      $namingDeploymentName = "get-names-rg-$Role-$(Get-Date -Format 'yyyyMMddHHmmss')" -replace '[^a-zA-Z0-9._-]', '-'
                      Write-Host "Getting resource group name for role $Role..."
                      az deployment sub create --name $namingDeploymentName --location $location --template-file $namingFile --parameters subType=$subType svc=$svc role=$Role deploymentEnvInstance=$deploymentEnvInstance regionCode=$regionCode instanceNumber=$instanceNumber --output none
                      if ($LASTEXITCODE -ne 0) { throw "Naming convention deployment failed for role $Role" }
                      $resourceGroupName = az deployment sub show --name $namingDeploymentName --query "properties.outputs.resourceGroupName.value" -o tsv
                      if (-not $resourceGroupName) { throw "Could not get resourceGroupName for role $Role" }
                      $rgDeploymentName = "rg-$Role-$(Get-Date -Format 'yyyyMMddHHmmss')" -replace '[^a-zA-Z0-9._-]', '-'
                      Write-Host "Deploying resource group: $resourceGroupName"
                      az deployment sub create --name $rgDeploymentName --location $location --template-file $bicepFile --parameters name=$resourceGroupName location=$location subType=$subType adGroupObjectId=$adGroupObjectId --output none
                      if ($LASTEXITCODE -ne 0) { throw "Resource group deployment failed for role $Role" }
                      $resourceGroupNameOutput = az deployment sub show --name $rgDeploymentName --query "properties.outputs.resourceGroupName.value" -o tsv
                      if ($Role -eq 'INF') {
                        $virtualNetworkName = az deployment sub show --name $namingDeploymentName --query "properties.outputs.virtualNetworkName.value" -o tsv
                        $routeTableName = az deployment sub show --name $namingDeploymentName --query "properties.outputs.routeTableName.value" -o tsv
                        Write-Host "##vso[task.setvariable variable=virtualNetworkResourceGroup]$resourceGroupNameOutput"
                        Write-Host "##vso[task.setvariable variable=virtualNetworkName]$virtualNetworkName"
                        Write-Host "##vso[task.setvariable variable=routeTableName]$routeTableName"
                      }
                    }
              - ${{ if eq(variables.IsNetworkNsg, true) }}:
                - name: network-security-group
                  path: infra/common/network
                  resourceGroupName: $(virtualNetworkResourceGroup)
              - ${{ if or(eq(variables.IsNetworkVnet, true), eq(variables.IsNetworkRouteTable, true)) }}:
                # Script step with workingDirectory = repo root so token replacement sees the right path (v5 task does not)
                - name: route-table-tokens
                  type: replaceTokensOnly
                  replaceTokenPathsString: 'resources/network/route-table/1;resources/network/route-table/2;resources/network/route-table/3'
                - name: deploy-route-tables
                  type: 'script'
                  scriptType: AzureCLI
                  azureCLIScriptType: pscore
                  serviceConnectionVariableName: 'mstAzureResourceManagerConnection'
                  inlineScript: |
                    # Deploy route table 1 (default) always; deploy 2, 3, ... when referenced in config (subnetNRouteTable). Subnet count derived from VNet template (subnetLayout).
                    & "$(Pipeline.Workspace)/s/self/scripts/pipeline/Deploy-RouteTables.ps1" `
                      -BuildSourcesDirectory "$(Pipeline.Workspace)/s/self" `
                      -ResourceGroupName "$(virtualNetworkResourceGroup)" `
                      -RouteTableName "$(routeTableName)" `
                      -Location "$(location)" `
                      -FirewallVirtualApplianceIp "$(firewallVirtualApplianceIp)" `
                      -SubnetLayout "$(subnetLayout)"
                - name: set-subnet-route-table-resource-ids
                  type: 'script'
                  scriptType: PowerShell
                  inlineScript: |
                    # Set pipeline variables for token replacement: subnetNRouteTableResourceId from subnetNRouteTable and routeTable0NResourceId. Subnet count derived from VNet template (same as deploy-route-tables).
                    $layout = "$(subnetLayout)"
                    $base = "$(Pipeline.Workspace)/s/self"
                    if (-not (Test-Path (Join-Path $base "resources"))) { $base = "$(Build.SourcesDirectory)" }
                    if (-not (Test-Path (Join-Path $base "resources"))) { $base = "$(Build.SourcesDirectory)/self" }
                    $vnetPath = Join-Path $base "resources/network/vnet/$layout/virtual-network.parameters.json"
                    if (-not (Test-Path $vnetPath)) { $vnetPath = Join-Path $base "self/resources/network/vnet/$layout/virtual-network.parameters.json" }
                    $max = 1
                    if (Test-Path $vnetPath) {
                      $content = Get-Content -LiteralPath $vnetPath -Raw -Encoding UTF8
                      $subnetNameMatches = [regex]::Matches($content, '"name":\s*"subnet\d+"')
                      if ($subnetNameMatches.Count -gt 0) { $max = $subnetNameMatches.Count }
                    }
                    foreach ($i in 1..$max) {
                      $v1 = (Get-Item -Path "Env:SUBNET${i}ROUTETABLE" -ErrorAction SilentlyContinue).Value
                      $v2 = (Get-Item -Path "Env:subnet${i}RouteTable" -ErrorAction SilentlyContinue).Value
                      $v3 = [Environment]::GetEnvironmentVariable("subnet${i}routetable", 'Process')
                      $v4 = (Get-ChildItem Env: | Where-Object { $_.Name -match "subnet.*$i.*route" } | Select-Object -First 1).Value
                      $rt = $v1; if ([string]::IsNullOrWhiteSpace($rt)) { $rt = $v2 }; if ([string]::IsNullOrWhiteSpace($rt)) { $rt = $v3 }; if ([string]::IsNullOrWhiteSpace($rt)) { $rt = $v4 }; if ([string]::IsNullOrWhiteSpace($rt)) { $rt = '1' }
                      $id = ''
                      if ([int]$rt -gt 0) {
                        $suffix = '{0:D2}' -f [int]$rt
                        $idU = (Get-Item -Path "Env:ROUTETABLE${suffix}RESOURCEID" -ErrorAction SilentlyContinue).Value
                        $idL = (Get-Item -Path "Env:routeTable${suffix}ResourceId" -ErrorAction SilentlyContinue).Value
                        $id = $idU; if ([string]::IsNullOrEmpty($id)) { $id = $idL }
                      }
                      Write-Host "##vso[task.setvariable variable=subnet${i}RouteTableResourceId]$id"
                    }
                - name: virtual-network
                  path: resources/network/vnet
                  parameterFilePath: resources/network/vnet/$(subnetLayout)
                  resourceGroupName: $(virtualNetworkResourceGroup)
                  preDeployScriptsList:
                    - displayName: "Resolve network join group object ID"
                      type: AzurePowerShell
                      serviceConnectionVariableName: 'ssvServiceConnection'
                      inlineScript: |
                        $groupName = '$(networkJoinGroupName)'
                        if ([string]::IsNullOrWhiteSpace($groupName)) {
                          Write-Host "networkJoinGroupName not set; skipping network join role assignment."
                          Write-Host "##vso[task.setvariable variable=networkJoinGroupObjectId]"
                        } else {
                          try {
                            $group = Get-AzADGroup -DisplayName $groupName
                            Write-Host "Resolved group '$groupName' to object ID: $($group.Id)"
                            Write-Host "##vso[task.setvariable variable=networkJoinGroupObjectId]$($group.Id)"
                          } catch {
                            Write-Host "##vso[task.logissue type=warning]Could not resolve AD group '$groupName': $_"
                            Write-Host "##vso[task.setvariable variable=networkJoinGroupObjectId]"
                          }
                        }
                  postDeployScriptsList:
                    - displayName: "Link the VNet to Hub"
                      scriptPath: scripts/pipeline/Trigger-VNetPeering.ps1
                      type: AzurePowerShell
                      serviceConnectionVariableName: 'ssvServiceConnection'
                      useSystemAccessToken: true
                      scriptArguments: >
                        -VirtualNetworkName $(virtualNetworkName)
                        -SubscriptionName $(subscriptionName)
                        -TenantId $(tenantId)
                        -PeerToSec $false
                    - displayName: "Debug - Output transformed parameter file (runs on failure)"
                      type: PowerShell
                      inlineScript: |
                        $transformedFile = "$(Build.SourcesDirectory)/self/resources/network/vnet/$(subnetLayout)/virtual-network.transformed.parameters.json"
                        if (Test-Path $transformedFile) {
                          Write-Host "=== Transformed Parameter File Contents ==="
                          Get-Content $transformedFile | Write-Host
                          Write-Host "=== End of Transformed Parameter File ==="
                          
                          # Try to parse as JSON to show any syntax errors
                          try {
                            $json = Get-Content $transformedFile -Raw | ConvertFrom-Json
                            Write-Host "✓ JSON is valid"
                          } catch {
                            Write-Host "✗ JSON parsing error: $_"
                            Write-Host "Error details: $($_.Exception.Message)"
                          }
                        } else {
                          Write-Host "Transformed file not found at: $transformedFile"
                        }
              - ${{ if eq(variables.IsNetworkFlowLogs, true) }}:
                - name: virtual-network-flow-logs
                  path: infra/common/network
                  resourceGroupName: $(networkWatcherResourceGroup)
              - ${{ if eq(variables.IsNetworkPublicDNSZone, true) }}:
                - name: dns-zone
                  path: infra/core/env/public-dns-zone
                  resourceGroupName: $(dnsResourceGroup)

        - ${{ if eq(variables.IsMonitoring, true) }}:
          - name: monitoring
            deployments:
              - ${{ if eq(variables.IsMonitoringInsights, true) }}:
                - name: GetAppInsightConnectionString
                  type: 'script'
                  scriptType: AzurePowerShell
                  inlineScript: |
                    $output = (Get-AzApplicationInsights -ResourceGroupName $(servicesResourceGroup) -Name $(applicationInsightsName)).ConnectionString
                    Write-Host "##vso[task.setvariable variable=appInsightConnectionString;]$output"         
            
              - ${{ if eq(variables.IsMonitoringAzureMonitorWorkspace, true) }}:
                - name: azure-monitor-workspace
                  path: infra/core/env/observability
                  resourceGroupName: $(servicesResourceGroup)


                  
        - ${{ if eq(variables.IsApplication, true) }}:  
          - name: application_infra
            ${{ if eq(variables.IsAll, true) }}:
              dependsOnGroupedDeployments:
              - network
            deployments:

              - ${{ if eq(variables.IsApplicationAiDocumentIntelligence1, true) }}:
                - name: ai-document-intelligence-zone
                  path: infra/core/env/private-dns-zone
                  resourceGroupName: $(dnsResourceGroup)
                  postDeployScriptsList:
                    - displayName: Link the Private DNS Zone to Central networks
                      scriptPath: infra/core/env/scripts/Trigger-LinkPrivateDNSZones.ps1
                      type: PowerShell
                      useSystemAccessToken: true
                      scriptArguments: >
                        -PrivateDnsZoneName "$(infraResourceNamePrefix)$(nc_resource_ai_document_intelligence)$(environmentId)$(regionCode)01.privatelink.cognitiveservices.azure.com"
                        -ResourceGroupName $(dnsResourceGroup)
                        -SubscriptionName $(subscriptionName)
                        -TenantId $(tenantId)                   
                - name: ai-document-intelligence
                  path: infra/core/env/ai-document-intelligence
                  parameterFilePath: infra/core/env/ai-document-intelligence/ai-document-intelligence-depolyment-1-params
                  resourceGroupName: $(servicesResourceGroup)
              - ${{ if eq(variables.IsApplicationStorageAccount, true) }}:                    
                - name: application-storage-account
                  path: infra/core/env/storage-account
                  resourceGroupName: $(servicesResourceGroup)
                  privateEndpointDnsRecordsForResources:
                    - resourceName: $(infraResourceNamePrefix)$(nc_resource_storageaccount)$(environmentId)$(regionCode)01
                      resourceGroupName: $(servicesResourceGroup)

              - ${{ if eq(variables.IsApplicationKeyVault, true) }}:                    
                - name: key-vault
                  path: infra/core/env/key-vault
                  parameterFilePath: infra/core/env/key-vault/application-keyvault-params
                  resourceGroupName: $(servicesResourceGroup)
                  privateEndpointDnsRecordsForResources:
                    - resourceName: $(infraResourceNamePrefix)$(nc_resource_keyvault)$(environmentId)$(regionCode)01
                      resourceGroupName: $(servicesResourceGroup)
             
        - ${{ if eq(variables.IsOpenAi, true) }}:  
          - name: openai
            ${{ if eq(variables.IsAll, true) }}:
              dependsOnGroupedDeployments:
              - network
            deployments:
              - ${{ if eq(variables.IsOpenAiInfra, true) }}:    
                - name: open-ai
                  path: infra/core/env/open-ai
                  resourceGroupName: $(servicesResourceGroup)
                  privateEndpointDnsRecordsForResources:
                    - resourceName: $(infraResourceNamePrefix)$(nc_resource_openai)$(environmentId)$(regionCode)01
                      resourceGroupName: $(servicesResourceGroup)                   
                  preDeployScriptsList:
                  - displayName: 'Get Group Id'
                    type: AzurePowerShell
                    serviceConnectionVariableName: 'ssvServiceConnection'
                    inlineScript: |
                      $groupId = (Get-AzADGroup -DisplayName '$(openAiUserGroup)').id
                      Write-Host "##vso[task.setvariable variable=openAiUserGroupId;]$groupId"
              - ${{ if eq(variables.IsOpenAiSearchService, true) }}:
                - name: search-service
                  path: infra/core/env/search-service
                  resourceGroupName: $(servicesResourceGroup)
                  privateEndpointDnsRecordsForResources:
                    - resourceName: $(infraResourceNamePrefix)$(nc_resource_search)$(environmentId)$(regionCode)01
                      resourceGroupName: $(servicesResourceGroup)                  
                  preDeployScriptsList:
                  - displayName: 'Get Group Id'
                    type: AzurePowerShell
                    serviceConnectionVariableName: 'ssvServiceConnection'
                    inlineScript: |
                      $groupId = (Get-AzADGroup -DisplayName '$(searchServiceUserGroup)').id
                      Write-Host "##vso[task.setvariable variable=searchServiceUserGroupId;]$groupId"
                  - displayName: 'Check Private Endpoint Connection'
                    type: AzurePowerShell
                    serviceConnectionVariableName: "subscriptionName"
                    scriptPath: 'infra/core/env/scripts/PrivateEndpointConnection.ps1'
                    scriptArguments: > 
                      -OpenAiName '$(infraResourceNamePrefix)$(nc_resource_openai)$(environmentId)$(regionCode)01'
                      -ResourceGroupName '$(servicesResourceGroup)'
                      -SearchServiceName '$(infraResourceNamePrefix)$(nc_resource_search)$(environmentId)$(regionCode)01'
                      -Command 'Check'
                  postDeployScriptsList:
                  - displayName: 'Approve Private Endpoint Connection'
                    type: AzurePowerShell
                    serviceConnectionVariableName: "subscriptionName"
                    scriptPath: 'infra/core/env/scripts/PrivateEndpointConnection.ps1'
                    scriptArguments: > 
                      -OpenAiName '$(infraResourceNamePrefix)$(nc_resource_openai)$(environmentId)$(regionCode)01'
                      -ResourceGroupName '$(servicesResourceGroup)'
                      -SearchServiceName '$(infraResourceNamePrefix)$(nc_resource_search)$(environmentId)$(regionCode)01'
                      -Command 'Approve'

