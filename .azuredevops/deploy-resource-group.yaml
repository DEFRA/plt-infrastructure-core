# Standalone pipeline: create a single resource group by role.
# Can be run manually or from another pipeline. For platform RG creation (INF + EXP + APP), use deploy-platform-core-env.yaml.
---
pool:
  name: DEFRA-COMMON-ubuntu2004-SSV5

parameters:
  - name: subType
    displayName: Sub Type (3-4 characters, e.g., SSV5, PRD, DEV)
    type: string
  - name: svc
    displayName: Service code (3 characters, e.g., AIE, AAD)
    type: string
  - name: role
    displayName: Role code (3 characters, e.g. INF, EXP, APP)
    type: string
  - name: deploymentEnvInstance
    displayName: Deployment Environment instance number (1 digit, 0-9)
    type: string
  - name: regionCode
    displayName: Region code (1 digit, e.g., 4 for UK South)
    type: string
  - name: instanceNumber
    displayName: Instance number within the region (2 digits, 00-99)
    type: string
  - name: location
    displayName: Azure region short name (e.g. UKSouth)
    type: string
  - name: subscriptionName
    displayName: Azure Subscription Service Connection Name (from config subscriptionName)
    type: string
  - name: adGroupObjectId
    displayName: AD group object ID for resource group RBAC (from config adGroupObjectId)
    type: string

trigger: none

stages:
  - stage: create_resource_group
    displayName: Create Resource Group
    variables:
      - name: subType
        value: ${{ parameters.subType }}
      - name: serviceCode
        value: ${{ parameters.svc }}
      - name: applicationID
        value: ${{ parameters.svc }}
      - name: deploymentEnvInstance
        value: ${{ parameters.deploymentEnvInstance }}
      - name: regionCode
        value: ${{ parameters.regionCode }}
      - name: instanceNumber
        value: ${{ parameters.instanceNumber }}
      - name: location
        value: ${{ parameters.location }}
      - name: adGroupObjectId
        value: ${{ parameters.adGroupObjectId }}
    jobs:
      - template: templates/deploy-resource-group-job.yaml
        parameters:
          role: ${{ parameters.role }}
          setNetworkVariables: false
          subscriptionName: ${{ parameters.subscriptionName }}
          repositoryRoot: $(Pipeline.Workspace)/s
