                #       $bicepFile = "$(Pipeline.Workspace)/s/resources/resource-group/resource-group.bicep"
                #       $deploymentName = "rg-create-$(Build.BuildId)-$(Build.BuildNumber)"
                      
                #       Write-Host "Creating resource group: $(resourceGroupName)"
                      
                #       $deploymentParams = @{
                #         name = "$(resourceGroupName)"
                #         location = "${{ parameters.location }}"
                #         subType = "${{ parameters.subType }}"
                #       }
                      
                #       $deployment = New-AzSubscriptionDeployment `
                #         -Name $deploymentName `
                #         -Location "${{ parameters.location }}" `
                #         -TemplateFile $bicepFile `
                #         -TemplateParameterObject $deploymentParams
                      
                #       if ($deployment.ProvisioningState -ne "Succeeded") {
                #         Write-Error "Failed to create resource group. ProvisioningState: $($deployment.ProvisioningState)"
                #         exit 1
                #       }
                      
                #       Write-Host "Resource group created successfully: $(resourceGroupName)"
                #       Write-Host "Resource Group ID: $($deployment.Outputs.resourceId.Value)"
